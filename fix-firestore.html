<!DOCTYPE html>
<html>

<head>
    <title>TransitPay - Fix Firestore Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: #fff;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #16213e;
            padding: 30px;
            border-radius: 12px;
        }

        h1 {
            color: #e94560;
        }

        button {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px 5px;
            display: block;
            width: 100%;
        }

        button:hover {
            background: #c73750;
        }

        .log {
            background: #0f3460;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }

        .info {
            color: #60a5fa;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔧 Fix Firestore Data v3</h1>
        <p>Click the button below. It will write data and verify.</p>
        <button onclick="fixAll()">🚀 Fix Everything Now</button>
        <div class="log" id="log">Ready...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyAP9qvV3TE4BhA6hk4zJDkICTbrN93Z63k",
            authDomain: "transitpay-e445.firebaseapp.com",
            projectId: "transitpay-e445",
            storageBucket: "transitpay-e445.firebasestorage.app",
            messagingSenderId: "900738758923",
            appId: "1:900738758923:web:d1bf99f339bdb135130a0e"
        });

        const db = firebase.firestore();
        const logEl = document.getElementById('log');

        function log(msg, type) {
            const s = document.createElement('span');
            s.className = type || '';
            s.textContent = msg + '\n';
            logEl.appendChild(s);
            logEl.scrollTop = logEl.scrollHeight;
        }

        const registryData = {
            host: {
                name: "VIONA",
                phone: "0165858672",
                createdAt: "2026-02-25T20:38:00.000Z"
            },
            tenants: [
                { code: "HUGA", name: "Huga Services", phone: "+60178850938", status: "Active", createdAt: "2026-02-19T00:00:00.000Z" },
                { code: "VIONA", name: "VIONA", phone: "+60165858672", status: "Active", createdAt: "2026-02-25T00:00:00.000Z" },
                { code: "JUDY", name: "Judy transport", phone: "+60169071675", status: "Active", createdAt: "2026-02-25T00:00:00.000Z" }
            ]
        };

        const tenantDoc = {
            nextReceiptNumber: 1001,
            receipts: [], clients: [], users: [],
            petrolExpenses: [], emailHistory: [], auditLog: [],
            _created: new Date().toISOString()
        };

        async function fixAll() {
            logEl.innerHTML = '';

            // Auth
            log('Authenticating...', 'info');
            try {
                await firebase.auth().signInAnonymously();
                log('✅ Auth OK', 'success');
            } catch (e) {
                log('Auth error: ' + e.message, 'error');
            }

            // Force network on
            log('Enabling network...', 'info');
            try {
                await db.enableNetwork();
                log('✅ Network enabled', 'success');
            } catch (e) { }

            // WRITE 1: Registry - fire and don't wait
            log('\nWriting config/registry (fire-and-forget)...', 'info');
            const regRef = db.collection('config').doc('registry');
            regRef.set(registryData).then(() => {
                log('✅ Registry write confirmed!', 'success');
            }).catch(e => {
                log('Registry write error: ' + e.message, 'error');
            });

            // WRITE 2: Tenant docs - fire and don't wait
            for (const code of ['HUGA', 'VIONA', 'JUDY']) {
                log('Writing tenants/' + code + '...', 'info');
                db.collection('tenants').doc(code).set(
                    Object.assign({ tenantName: code }, tenantDoc),
                    { merge: true }
                ).then(() => {
                    log('✅ ' + code + ' write confirmed!', 'success');
                }).catch(e => {
                    log(code + ' error: ' + e.message, 'error');
                });
            }

            // Wait 8 seconds then verify by reading
            log('\n⏳ Waiting 8 seconds then verifying...', 'info');
            await new Promise(r => setTimeout(r, 8000));

            log('\nVerifying registry...', 'info');
            try {
                const snap = await Promise.race([
                    regRef.get({ source: 'server' }),
                    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000))
                ]);
                if (snap.exists) {
                    const d = snap.data();
                    const tenantCount = d.tenants ? d.tenants.length : 0;
                    if (tenantCount === 3) {
                        log('✅ Registry verified! ' + tenantCount + ' tenants found!', 'success');
                        log('Tenants: ' + d.tenants.map(t => t.code).join(', '), 'success');
                    } else {
                        log('⚠️ Registry has ' + tenantCount + ' tenants (expected 3)', 'error');
                        log('Data: ' + JSON.stringify(d.tenants), 'info');
                    }
                }
            } catch (e) {
                log('Verify failed: ' + e.message, 'info');
                log('The writes may still be pending. Check Firebase Console.', 'info');
            }

            log('\n🎉 Done! Check Firebase Console to confirm.', 'success');
        }
    </script>
</body>

</html>
